<!DOCTYPE html>
<html>
<head>
<style>
.container {
  position: relative;
  width: 930px; /* width of box + image space */
  margin: 40px auto;
}

.box {
  background-color: lightgrey;
  width: 800px;
  border: 15px solid green;
  padding: 50px;
  border-radius: 25px;
  box-shadow: 0px 8px 16px rgba(0,0,0,0.15);
  margin-left: auto;   /* keeps it aligned to the right */
}

.overlap-image {
  position: absolute;
  bottom: -60px;   /* Moves image below the box */
  left: 50%;
  transform: translateX(-50%);
  width: 300px;    /* Adjust size */
  z-index: 2;      /* Places image above the box */
}
</style>
</head>
<body>

<h2>Demonstrating the Box Model</h2>

<div class="container">

  <div class="box">
    This text is the content of the box. We have added a 50px padding,
    20px margin and a 15px green border. Ut enim ad minim veniam,
    quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea
    commodo consequat.
  </div>

  <img class="overlap-image" src="https://f2.toyhou.se/file/f2-toyhou-se/images/27833168_3af9TgEZfg3EkiI.png" alt="Image">

</div>

</body>
</html>
