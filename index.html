<!DOCTYPE html>
<html>
<head>
<style>
.container {
  position: relative;
  width: 930px; /* width of box + image space */
  margin: 40px auto;
}

.box {
  background-color: #DCC5A5;
  width: 800px;
  border-style: solid;
  border-color: #81A430;
  border-width: 12px;
  padding: 20px;
  border-radius: 25px;
  box-shadow: 0px 8px 16px rgba(0,0,0,0.15);
  margin-left: auto;   /* keeps it aligned to the right */
}

.overlap-image {
  position: absolute;
  bottom: -60px;   /* Moves image below the box */
  left: 50%;
  transform: translateX(-50%);
  width: 200px;    /* Adjust size */
  z-index: 2;      /* Places image above the box */
}

.corner-image {
  position: absolute;    /* Pulls image out of normal document flow */
  top: 10px;
  left: 0px;            /* Binds image to top-left corner */
  width: 100px;
}
</style>
</head>
<body style="background-color: #FAF9F2;">


<div class="container">

  <div class="box">
  
  <!-- ICONS -->
     <meta charset="UTF-8">
    <meta name="viewport" content=
        "width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href=
"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.6.3/css/font-awesome.css">


    <title>Icon Bar using HTML and CSS</title>

    <style>
        .icon-bar {
            overflow: hidden;
        }

        .icon-bar a {
            float: right;
            display: block;
            color: white;
            text-align: center;
            padding: 10px 10px;
            padding-top: 10px;
  			padding-bottom: 25px;
            text-decoration: none;
            font-size: 30px;
        }
        
        .fa-envelope:hover {
    	color: #D6D3CC;
}
       .fa-linkedin:hover {
              color: #D6D3CC;
      }
    </style>
</head>

<body>
    <div class="icon-bar">
        <a href="#"><i class="fa fa-linkedin"></i></a>
        <a href="#"><i class="fa fa-envelope"></i></a>
    </div>
</body>
