<style>
.container {
  display: grid;
  place-items: center;  
  position: relative;
  width: 1200px; /* width of box + image space */
  margin: 40px auto;
  font-family: "Jost";
  
}

.box {
  background-color: #DCC5A5;
  width: 400px;
  border-style: solid;
  border-color: #81A430;
  border-width: 4.5px;
  padding: 20px 20px;
  border-radius: 25px;
  box-shadow: 0px 8px 16px rgba(0,0,0,0.15);
  margin-left: 340px;   /* keeps it aligned to the right */
}

.box2 {
  background-color: #DCC5A5;
  width: 400px;
  border-style: solid;
  border-color: #81A430;
  border-width: 4.5px;
  padding: 20px 20px;
  border-radius: 25px;
  box-shadow: 0px 8px 16px rgba(0,0,0,0.15);
  margin-left: 340px;   /* keeps it aligned to the right */
  margin-top: 20px;
}

.overlap-image {
  position: absolute;
  bottom: -10px;   /* Moves image below the box */
  left: 90%;
  transform: translateX(-50%);
  width: 300px;    /* Adjust size */
  z-index: 2;      /* Places image above the box */
}

.corner-image {
  position: absolute;    /* Pulls image out of normal document flow */
  top: 10px;
  left: 0px;            /* Binds image to top-left corner */
  width: 300px;
  min-height: 500px;
  border-radius: 10em 0 0em 0;
  margin-left: 200px
}

</style>
</head>
