<!--- CSS STYLE SETUP ---> 
<style>

/* Main Container */
.container {
  display: grid;
  place-items: center;
  position: relative;
  width: 1200px;
  margin: 40px auto;

  /* Move the entire composition left */
  /* left: -170px; */

  font-family: "Jost";
}

/* 1st Textbox (Top)*/
.box {
  background-color: #DCC5A5;
  width: 400px;
  border-style: solid;
  border-color: #81A430;
  border-width: 4.5px;
  padding: 20px 20px;
  border-radius: 25px;
  box-shadow: 0px 8px 16px rgba(0,0,0,0.15);
  margin-left: 340px;   /* keeps it aligned to the right */
}

/* 2nd Textbox (Bottom) */
.box2 {
  background-color: #DCC5A5;
  width: 400px;
  border-style: solid;
  border-color: #81A430;
  border-width: 4.5px;
  padding: 20px 20px;
  border-radius: 25px;
  box-shadow: 0px 8px 16px rgba(0,0,0,0.15);
  margin-left: 340px;   /* keeps it aligned to the right */
  margin-top: 20px;
}

/* Flowers Image (Hanging, Right) */
.overlap-image {
  position: absolute;
  margin-bottom: 300px;   /* Moves image below the box */
  left: 90%;
  transform: translateX(-50%);
  width: 300px;    /* Adjust size */
  z-index: 2;      /* Places image above the box */
}

/* Clovers Image (Rounded, Left)  */
.corner-image {
  position: absolute;    /* Pulls image out of normal document flow */
  top: 10px;
  left: 0px;            /* Binds image to top-left corner */
  width: 300px;
  min-height: 500px;
  border-radius: 10em 0 0em 0;
  margin-left: 200px
}

body {
	padding: 0;
}

/* Leaf Shape Code  */
.leafcontainer {
	margin: 50px;
    margin-left: 400px;
	display: flex;
	flex-wrap: wrap;
	gap: 10px;
}

.leaf-1 {
	width: 100px;
	height: 100px;
	border-radius: 0 70px;
	background-color: #1f801f;
	transform: rotate(0deg);
}

.leaf-2 {
	width: 100px;
	height: 100px;
	border-radius: 0 80px;
	background-color: #259925;
	transform: rotate(0deg);
}

.leaf-3 {
	width: 100px;
	height: 100px;
	border-radius: 0 90px;
	background-color: #2bb32b;
	transform: rotate(0deg);
}

.leaf-4 {
	width: 100px;
	height: 100px;
	border-radius: 0 100px;
	background-color: #32cd32;
	transform: rotate(0deg);
}

</style>
