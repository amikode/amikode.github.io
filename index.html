<!DOCTYPE html>
<html>
<head>
<style>
.container {
  position: relative;
  width: 1200px; /* width of box + image space */
  margin: 40px auto;
}

.box {
  background-color: #DCC5A5;
  width: 400px;
  border-style: solid;
  border-color: #81A430;
  border-width: 5px;
  padding: 20px 20px;
  border-radius: 25px;
  box-shadow: 0px 8px 16px rgba(0,0,0,0.15);
  margin-left: 340px;   /* keeps it aligned to the right */
}

.overlap-image {
  position: absolute;
  bottom: -80px;   /* Moves image below the box */
  left: 72%;
  transform: translateX(-50%);
  width: 300px;    /* Adjust size */
  z-index: 2;      /* Places image above the box */
}

.corner-image {
  position: absolute;    /* Pulls image out of normal document flow */
  top: 10px;
  left: 0px;            /* Binds image to top-left corner */
  width: 300px;
  min-height: 300px;
  border-radius: 10em 0 0em 0;
}
</style>
</head>
